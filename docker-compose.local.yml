services:
  mongo:
    image: mongo:5.0
    container_name: tapdata-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}
      MONGO_INITDB_DATABASE: tapdata
    entrypoint:
      - sh
      - -c
      - |
        echo '
        if [ ! -f /opt/keyfile/mongodb-keyfile ]; then
          echo "Generating keyfile..."
          openssl rand -base64 756 > /opt/keyfile/mongodb-keyfile
          chmod 400 /opt/keyfile/mongodb-keyfile
          chown 999:999 /opt/keyfile/mongodb-keyfile
        else
          chmod 400 /opt/keyfile/mongodb-keyfile
          chown 999:999 /opt/keyfile/mongodb-keyfile
        fi
        exec /usr/local/bin/docker-entrypoint.sh "$@"
        ' | tr -d '\r' | sh -s -- "$@"
      - --
    command: ["--replSet", "rs0", "--bind_ip_all", "--auth", "--keyFile", "/opt/keyfile/mongodb-keyfile"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ../data/keyfile:/opt/keyfile
    networks:
      - tapdata-net
    healthcheck:
      test: ["CMD", "mongo", "--eval", "rs.status().ok || rs.initiate()"]
      interval: 10s
      timeout: 10s
      retries: 5

  tm:
    container_name: tapdata-tm
    build:
      context: ..
      dockerfile: tapdata/Dockerfile
      target: tm
    ports:
      - "${TM_PORT:-3030}:3030"
    command: 
      - sh
      - -c
      - |
        tr -d '\r' < bin/start_with_register.sh > /tmp/start_with_register.sh
        chmod +x /tmp/start_with_register.sh
        /tmp/start_with_register.sh
    depends_on:
      mongo:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tapdata-net
    environment:
      - JAVA_OPTS=${TM_JAVA_OPTS:--Xmx4g}
      - SERVER_PORT=${TM_PORT:-3030}
      - TM_HEAP_SIZE=${TM_HEAP_SIZE:-4G}
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}@mongo:${MONGO_PORT:-27017}/tapdata?authSource=admin&replicaSet=rs0
      - DEFAULT_MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}@mongo:${MONGO_PORT:-27017}/tapdata?authSource=admin&replicaSet=rs0
      - OBS_MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}@mongo:27017/tapdata?authSource=admin&replicaSet=rs0
      - LOG_MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}@mongo:27017/tapdata?authSource=admin&replicaSet=rs0

  engine:
    container_name: tapdata-engine
    depends_on:
      mongo:
        condition: service_healthy
    build:
      context: ..
      dockerfile: tapdata/Dockerfile
      target: engine
    command: 
      - sh
      - -c
      - |
        tr -d '\r' < bin/register_and_start.sh > /tmp/register_and_start.sh
        chmod +x /tmp/register_and_start.sh
        sh /tmp/register_and_start.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tapdata-net
    environment:
      - WORK_DIR=/app/engine/dist
      - TM_BASE_URL=http://tm:${TM_PORT:-3030}/api/
      - backend_url=http://tm:${TM_PORT:-3030}/api/
      - engineMem=${ENGINE_HEAP_SIZE:-4G}
      - JAVA_OPTS=${ENGINE_JAVA_OPTS:--Xmx4g}
      - app_type=DAAS
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}@mongo:${MONGO_PORT:-27017}/tapdata?authSource=admin&replicaSet=rs0
      - SPRING_DATA_MONGODB_DEFAULT_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}@mongo:${MONGO_PORT:-27017}/tapdata?authSource=admin&replicaSet=rs0
      - SPRING_DATA_MONGODB_OBS_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}@mongo:${MONGO_PORT:-27017}/tapdata?authSource=admin&replicaSet=rs0
      - SPRING_DATA_MONGODB_LOG_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}@mongo:${MONGO_PORT:-27017}/tapdata?authSource=admin&replicaSet=rs0
      - TAPDATA_MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-tapdata_best2019}@mongo:${MONGO_PORT:-27017}/tapdata?authSource=admin&replicaSet=rs0

  web:
    container_name: tapdata-web
    build:
      context: ../tapdata-web
      dockerfile: ../tapdata/odh/web/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tapdata-net
    environment:
      - origin=http://tm:${TM_PORT:-3030}
      - NODE_ENV=community
      - VUE_APP_MODE=community
      - TM_API_URL=http://tm:${TM_PORT:-3030}
    depends_on:
      - tm
    volumes:
      - ./odh/web/server.js:/app/server.js

volumes:
  mongo_data:

networks:
  tapdata-net:
    driver: bridge
