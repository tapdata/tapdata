services:
  mongo:
    image: ghcr.io/tapdata/tapdata:latest
    container_name: tapdata-mongo-official
    hostname: tapdata-mongo-official
    # Create directories before starting mongod
    command: 
      - sh
      - -c
      - |
        echo '
        mkdir -p /tapdata/data/logs /tapdata/data/db
        mongod --dbpath=/tapdata/data/db/ --replSet=rs0 --bind_ip_all --logpath=/tapdata/data/logs/mongod.log
        ' | tr -d '\r' | sh
    environment:
      - dbMem=2
    volumes:
      - mongo_data:/tapdata/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongo", "--host", "127.0.0.1", "--eval", "try { rs.status().ok } catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'tapdata-mongo-official:27017'}]}) }"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - tapdata-net

  tm:
    image: ghcr.io/tapdata/tapdata:latest
    container_name: tapdata-tm-official
    working_dir: /tapdata/apps
    # Run only TM Jar
    command: 
      - sh
      - -c
      - |
        echo '
        if [ -f connectors/dist.tar.gz ]; then
          tar -xzf connectors/dist.tar.gz -C connectors/
        fi
        mkdir -p logs
        java -Xms4g -Xmx4g -jar -Dserver.port=3030 -server components/tm.jar --spring.config.additional-location=file:etc/ --logging.config=file:etc/logback.xml --spring.data.mongodb.default.uri=mongodb://tapdata-mongo-official:27017/tapdata?replicaSet=rs0 --spring.data.mongodb.obs.uri=mongodb://tapdata-mongo-official:27017/tapdata?replicaSet=rs0 --spring.data.mongodb.log.uri=mongodb://tapdata-mongo-official:27017/tapdata?replicaSet=rs0 > logs/tm.log 2>&1 &
        TM_PID=$$!
        echo "Waiting for TM to start..."
        until curl -s http://localhost:3030/api/ > /dev/null; do
          sleep 5
          echo "Waiting for TM..."
        done
        echo "Registering connectors..."
        java -jar lib/pdk-deploy.jar register -a 3324cfdf-7d3e-4792-bd32-571638d4562f -t http://localhost:3030 connectors/dist/mongodb-connector-v1.0-SNAPSHOT.jar
        echo "Registration complete. Tailing TM logs..."
        tail -f logs/tm.log &
        wait $$TM_PID
        ' | tr -d '\r' | sh
    depends_on:
      - mongo
    ports:
      - "${WEB_PORT:-8080}:3030"
    environment:
      - managerMem=4g
      - tm_port=3030
      - MONGO_URI=mongodb://tapdata-mongo-official:27017/tapdata?replicaSet=rs0
    volumes: []
    networks:
      - tapdata-net

  engine:
    image: ghcr.io/tapdata/tapdata:latest
    container_name: tapdata-engine-official
    working_dir: /tapdata/apps
    # Run only Engine Jar
    command: ["java", "-Xms4g", "-Xmx4g", "-jar", "components/tapdata-agent.jar"]
    depends_on:
      - tm
    environment:
      - app_type=DAAS
      - tm_port=3030
      - backend_url=http://tapdata-tm-official:3030/api/
      - MONGO_URI=mongodb://tapdata-mongo-official:27017/tapdata?replicaSet=rs0
      - TAPDATA_MONGO_URI=mongodb://tapdata-mongo-official:27017/tapdata?replicaSet=rs0
      - engineMem=4g
    networks:
      - tapdata-net

networks:
  tapdata-net:
    driver: bridge

volumes:
  mongo_data:
